  <div class="summary-row">

<!-- CARD MODAL -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 id="modal-title">New card</h2>
      <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <form id="card-form" autocomplete="off">
      <label class="field">
        <span class="field-label">Title</span>
        <input type="text" name="title" required>
      </label>

      <label class="field">
        <span class="field-label">Description</span>
        <textarea name="description" rows="3"></textarea>
      </label>

      <div class="field-row">
        <label class="field">
          <span class="field-label">Column</span>
          <select name="column">
            <option value="todo">To Do</option>
            <option value="progress">In Progress</option>
            <option value="hold">On Hold</option>
            <option value="done">Done</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">Link (optional)</span>
          <input type="url" name="link" placeholder="https://…">
        </label>
      </div>

      <div class="field-row">
        <label class="field">
          <span class="field-label">Start date</span>
          <input type="date" name="start">
        </label>
        <label class="field">
          <span class="field-label">End date</span>
          <input type="date" name="end">
        </label>
      </div>

      <div class="field">
        <span class="field-label">Tags</span>
        <div class="tag-options" id="tag-options"></div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-danger" id="delete-card-btn" hidden>Delete</button>
        <div class="modal-actions-spacer"></div>
        <button type="button" class="btn-secondary" id="cancel-btn">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- GITHUB TOKEN MODAL -->
<div class="modal-overlay" id="token-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="token-title">
    <div class="modal-header">
      <h2 id="token-title">GitHub access</h2>
      <button type="button" class="modal-close" id="token-close" aria-label="Close">&times;</button>
    </div>
    <label class="field">
      <span class="field-label">Token</span>
      <input type="password" id="token-input" placeholder="github_pat_…" autocomplete="off">
    </label>
    <div class="modal-actions">
      <button type="button" class="btn-danger" id="token-remove" hidden>Remove</button>
      <div class="modal-actions-spacer"></div>
      <button type="button" class="btn-secondary" id="token-cancel">Cancel</button>
      <button type="button" class="btn-primary" id="token-save">Save token</button>
    </div>
  </div>
</div>

<!-- TAGS MANAGEMENT MODAL -->
<div class="modal-overlay" id="tags-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="tags-title">
    <div class="modal-header">
      <h2 id="tags-title">Manage tags</h2>
      <button type="button" class="modal-close" id="tags-close" aria-label="Close">&times;</button>
    </div>
    <div class="tag-list" id="tags-list"></div>
    <div class="tag-add">
      <input type="text" id="tags-new-input" placeholder="Add new tag…">
      <button type="button" id="tags-add-btn" class="btn-secondary">Add</button>
    </div>
    <div class="modal-actions">
      <div class="modal-actions-spacer"></div>
      <button type="button" class="btn-primary" id="tags-done-btn">Done</button>
    </div>
  </div>
</div>

<!-- CARD DETAIL (VIEW) MODAL -->
<div class="modal-overlay" id="view-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="view-title">
    <div class="modal-header">
      <h2 id="view-title"></h2>
      <button type="button" class="modal-close" id="view-close" aria-label="Close">&times;</button>
    </div>
    <div id="view-body"></div>
    <div class="modal-actions">
      <div class="modal-actions-spacer"></div>
      <button type="button" class="btn-secondary" id="view-edit">Edit</button>
      <button type="button" class="btn-primary" id="view-close2">Close</button>
    </div>
  </div>
</div>
